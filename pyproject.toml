[tool.ruff]
line-length = 100
target-version = "py311"
exclude = ["tests/", "api/core/antigravity.py"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "S", "B"]
ignore = ["S101", "S311", "B008", "E501"]  # assert in tests, random in Easter egg, FastAPI Depends, line too long

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = true
warn_return_any = true
